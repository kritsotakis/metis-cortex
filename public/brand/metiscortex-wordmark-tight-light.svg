  <text x="240" y="64"
        text-anchor="middle"
        font-family="'Cormorant Garamond', 'Tiempos Headline', 'GT Sectra', Georgia, serif"
        font-size="64" font-weight="600" letter-spacing="6"
        fill="#0f203f">METIS</text>
  <text x="240" y="92"
        text-anchor="middle"
        font-family="'Inter', 'IBM Plex Sans', -apple-system, Helvetica, sans-serif"
        font-size="22" font-weight="500" letter-spacing="11"
        fill="#0f203f">C<tspan fill="#b07843">O</tspan>RTEX</text>
</svg>
